<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glücksrad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <p class="eyebrow">Der optimale Jahrestag</p>
    <h1>Dreh das Rad</h1>
    <p class="subtitle">und wähle so deine erste Mission</p>
  </header>

  <main>
    <div class="wheel-wrapper">
      <!-- Pointer -->
      <div class="pointer"></div>

      <!-- Canvas -->
      <canvas id="wheelCanvas" width="520" height="520"></canvas>

      <!-- Spin button -->
      <button id="spinBtn" class="spin-btn">Drehen</button>
    </div>

    <!-- Result display -->
    <div class="result-area" id="resultArea">
      <div class="result-inner">
        <p class="result-label">Deine nächste Mission:</p>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-subtext" id="resultSubtext"></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="progress-section">
      <p class="progress-heading">Optimierungsfortschritt:</p>
      <div class="progress-list">

        <div class="progress-item">
          <div class="progress-meta">
            <span class="progress-label">Kalibierung</span>
            <span class="progress-value">0 %</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="--fill: 0%"></div>
          </div>
        </div>

        <div class="progress-item">
          <div class="progress-meta">
            <span class="progress-label">Rekonstruktion</span>
            <span class="progress-value">0 %</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="--fill: 0%"></div>
          </div>
        </div>

        <div class="progress-item">
          <div class="progress-meta">
            <span class="progress-label">Auswertung</span>
            <span class="progress-value">0 %</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="--fill: 0%"></div>
          </div>
        </div>

      </div>
    </div>
  </footer>

  <script src="wheel.js"></script>
</body>
</html>
